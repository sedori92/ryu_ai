<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감성 분석기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AI 감성 분석기</h1>
      <p>문장 속 감정을 긍정, 부정, 중립으로 분석합니다.</p>
    </header>

    <main>
      <div class="card input-card">
        <textarea id="inputText" placeholder="분석할 문장을 입력하세요. (최대 1,000자)" maxlength="1000"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 1000</div>
        <button id="analyzeBtn">분석하기</button>
      </div>

      <div id="errorBox" class="error-box hidden"></div>

      <div id="resultCard" class="card result-card hidden">
        <h2>분석 결과</h2>
        <div class="result-header">
          <span id="sentimentBadge" class="badge"></span>
          <span id="confidenceScore" class="confidence"></span>
        </div>
        <div class="reason-box">
          <h3>분석 이유:</h3>
          <p id="reasonText"></p>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
